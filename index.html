<script>
        function descargarVCard() {
            const img = document.getElementById('miFoto');
            const canvas = document.createElement('canvas');
            
            // EL TRUCO PARA EL IPHONE: Forzamos la foto a un tamaño pequeño (200x200)
            const tamaño = 200;
            canvas.width = tamaño;
            canvas.height = tamaño;
            const ctx = canvas.getContext('2d');
            
            // Dibujamos la imagen ya comprimida
            ctx.drawImage(img, 0, 0, tamaño, tamaño);
            
            let base64Photo = "";
            try {
                // El '0.8' comprime un poquito la calidad para que el iPhone no la rechace
                const dataURL = canvas.toDataURL('image/jpeg', 0.8);
                base64Photo = dataURL.split(',')[1];
            } catch (e) {
                console.log("No se pudo procesar la foto.");
            }

            const vcard = `BEGIN:VCARD
VERSION:3.0
N:Guerra Borrero;Juan Camilo;;;
FN:Juan Camilo Guerra Borrero
ORG:Michigan Corporation
TITLE:CEO
TEL;TYPE=WORK,VOICE:+51959289048
EMAIL;TYPE=WORK:jguerrero@michigancorp.edu.pe
URL:https://michigancorp.pe
PHOTO;ENCODING=b;TYPE=JPEG:${base64Photo}
END:VCARD`;

            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            const enlace = document.createElement("a");
            enlace.href = url;
            enlace.download = "Juan_Camilo_Contacto.vcf";
            document.body.appendChild(enlace);
            enlace.click();
            document.body.removeChild(enlace);
            URL.revokeObjectURL(url);
        }
    </script>
