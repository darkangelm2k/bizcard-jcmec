<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC-MEC | Tarjeta Corporativa</title>
    <style>
        :root {
            --primary-color: #0f172a; /* Azul corporativo oscuro */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            color: var(--text-main);
            font-size: 24px;
        }
        h2 {
            margin: 5px 0 20px 0;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 400;
        }
        .btn-save {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 30px;
            transition: background-color 0.3s;
        }
        .btn-save:hover {
            background-color: #1e293b;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            display: block;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .link-btn:hover {
            background-color: var(--bg-color);
            border-color: #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <!-- Reemplaza el enlace de abajo por la URL de tu foto profesional -->
        <img src="https://media.licdn.com/dms/image/v2/D4E03AQF5TvojiUn90A/profile-displayphoto-shrink_400_400/B4EZVeIeTZGYAg-/0/1741041035702?e=1785974400&v=beta&t=_x7MpU3dioeaC1zAZkFIikMZk7y60iK1LsSuCy95aHY" alt="Foto de Perfil" class="profile-img">
        
        <h1>Juan Camilo Guerra Borrero</h1>
        <h2>CEO | Michigan Corporation</h2>

        <!-- Botón que ejecuta la función JavaScript para descargar el contacto -->
        <button class="btn-save" onclick="descargarVCard()">Guardar en Contactos</button>

        <div class="links-container">
            <a href="mailto:jguerrero@michigancorp.edu.pe" class="link-btn">✉️ Enviar Correo</a>
            <a href="https://www.linkedin.com/in/juancamiloguerraborrero/" class="link-btn" target="_blank">🔗 LinkedIn</a>
            <a href="https://www.michigancorp.pe/" class="link-btn" target="_blank">🌐 Web Institucional</a>
        </div>
    </div>

    <script>
        function descargarVCard() {
            // Aquí configuras los datos exactos que se guardarán en el celular
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Juan Camilo Guerra Borrero
ORG:Michigan Corporation
TITLE:Co-Founder
TEL;TYPE=WORK,VOICE:+51959289048
EMAIL;TYPE=WORK:jguerrero@michigancorp.edu.pe
URL:https://michigancorp.pe
END:VCARD`;

            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            const enlace = document.createElement("a");
            enlace.href = url;
            enlace.download = "Alonso_Contacto.vcf";
            document.body.appendChild(enlace);
            enlace.click();
            document.body.removeChild(enlace);
            URL.revokeObjectURL(url);
        }
    </script>

</body>
</html>
