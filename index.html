        :root {
            --primary-color: #0f172a; /* Azul corporativo oscuro */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            position: relative; /* Esto es vital para que el logo sepa dónde está la esquina */
        }
        
        /* ESTILOS DEL NUEVO LOGO EN LA ESQUINA IZQUIERDA */
        .company-logo {
            position: absolute;
            top: 25px;
            left: 25px; /* Cambiado a la izquierda */
            width: 120px; /* Tamaño mucho más grande para que el texto sea legible */
            height: auto;
            border-radius: 4px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            margin-bottom: 20px;
            margin-top: 15px; /* Un poco de espacio extra arriba por el logo */
        }
        h1 {
            margin: 0;
            color: var(--text-main);
            font-size: 24px;
        }
        h2 {
            margin: 5px 0 20px 0;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 400;
        }
        .btn-save {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            transition: background-color 0.3s;
        }
        .btn-save:hover {
            background-color: #1e293b;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            display: block;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .link-btn:hover {
            background-color: var(--bg-color);
            border-color: #cbd5e1;
        }
        
        .wallet-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 35px; 
            padding-top: 20px;
            border-top: 1px solid #e2e8f0; 
        }
        .wallet-badge {
            height: 44px; 
            width: auto;
            transition: transform 0.3s ease;
        }
        .wallet-badge:hover {
            transform: scale(1.03); 
        }
    </style>

    <script>
        function descargarVCard() {
            const img = document.getElementById('miFoto');
            const canvas = document.createElement('canvas');
            
            // EL TRUCO PARA EL IPHONE: Forzamos la foto a un tamaño pequeño (200x200)
            const tamaño = 200;
            canvas.width = tamaño;
            canvas.height = tamaño;
            const ctx = canvas.getContext('2d');
            
            ctx.drawImage(img, 0, 0, tamaño, tamaño);
            
            let base64Photo = "";
            try {
                const dataURL = canvas.toDataURL('image/jpeg', 0.8);
                base64Photo = dataURL.split(',')[1];
            } catch (e) {
                console.log("No se pudo procesar la foto.");
            }

            const vcard = `BEGIN:VCARD\nVERSION:3.0\nN:Guerra Borrero;Juan Camilo;;;\nFN:Juan Camilo Guerra Borrero\nORG:Michigan Corporation\nTITLE:CEO\nTEL;TYPE=WORK,VOICE:+51959289048\nEMAIL;TYPE=WORK:j.guerra@michigancorp.edu.pe\nURL:https://michigancorp.pe\nPHOTO;ENCODING=b;TYPE=JPEG:${base64Photo}\nEND:VCARD`;

            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            const enlace = document.createElement("a");
            enlace.href = url;
            enlace.download = "Juan_Camilo_Contacto.vcf";
            document.body.appendChild(enlace);
            enlace.click();
            document.body.removeChild(enlace);
            URL.revokeObjectURL(url);
        }
    </script>
